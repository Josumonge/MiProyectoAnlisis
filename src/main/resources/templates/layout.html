<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head th:fragment="head">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

        <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">

        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

        <link th:href="@{/style.css}" rel="stylesheet" type="text/css"/>
    </head>
    <body>

        <nav th:fragment="topbar" class="navbar navbar-custom sticky-top">
            <div class="container-fluid px-4">
                <a class="navbar-brand d-flex align-items-center" href="/">
                    <img th:src="@{/img/logo.jpeg}" alt="PubRock" width="40" height="40" class="me-2 rounded-circle">
                    <span>PUBROCK SYSTEM</span>
                </a>

                <div class="d-flex align-items-center">
                    <span class="me-3 d-none d-md-inline text-light">
                        Kendal Picado (Administrador)
                    </span>
                    <a th:href="@{/login}" class="btn btn-outline-light btn-sm">
                        <i class="bi bi-box-arrow-right me-1"></i> Cerrar Sesión
                    </a>
                </div>
            </div>
        </nav>

        <div th:fragment="sidebar" class="sidebar">
            <div class="nav-section-title">GESTIÓN OPERATIVA</div>
            <a th:href="@{/}" class="nav-link-custom">Dashboard</a>
            <a th:href="@{/punto-venta}" class="nav-link-custom">Punto de Venta</a>
            <a th:href="@{/ordenes}" class="nav-link-custom">Órdenes</a>
            <a th:href="@{/reservaciones}" class="nav-link-custom">Reservaciones</a>
            <a th:href="@{/inventario}" class="nav-link-custom">Inventario</a>

            <div class="nav-section-title mt-3">ADMINISTRACIÓN Y CONTROL</div>
            <a th:href="@{/usuarios}" class="nav-link-custom">Usuarios</a>
            <a th:href="@{/contabilidad}" class="nav-link-custom">Contabilidad</a>
            <a th:href="@{/promociones}" class="nav-link-custom">Promociones</a>
            <a th:href="@{/reportes}" class="nav-link-custom">Reportes</a>
            <a th:href="@{/marketing}" class="nav-link-custom">Marketing</a>
            <a th:href="@{/bitacora}" class="nav-link-custom">Bitácora</a>
        </div>

        <div th:fragment="scripts">
            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        </div>

    </body>
</html>
